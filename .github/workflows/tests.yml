name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.1"
            laravel: "^10.0"

          - php: "8.2"
            laravel: "^10.0"

          - php: "8.3"
            laravel: "^10.0"

          - php: "8.2"
            laravel: "^11.0"

          - php: "8.3"
            laravel: "^11.0"

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: redis

      - name: Disable Composer security blocking
        run: composer config audit.block-insecure false

      - name: Update Laravel version
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" \
                           "illuminate/http:${{ matrix.laravel }}" \
                           "illuminate/redis:${{ matrix.laravel }}" \
                           --no-update

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction

      - name: Run Tests
        env:
          REDIS_HOST: redis
          REDIS_PORT: 6379
        run: vendor/bin/phpunit